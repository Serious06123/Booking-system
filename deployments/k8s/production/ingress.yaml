apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: production-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/enable-cors: "true" # Giúp FE gọi API không bị lỗi CORS
spec:
  rules:
  - host: bookinghotel.local
    http:
      paths:
      # 1. Toàn bộ các API liên quan đến Auth/Customer/Admin điều hướng về Identity Service
      - path: /api/customers
        pathType: Prefix
        backend:
          service:
            name: identity-service
            port:
              number: 8080
      - path: /api/admin
        pathType: Prefix
        backend:
          service:
            name: identity-service
            port:
              number: 8080

      # 2. Toàn bộ các API liên quan đến Đặt phòng & Quản lý phòng điều hướng về Booking Service
      - path: /api/bookings
        pathType: Prefix
        backend:
          service:
            name: booking-service
            port:
              number: 8081
      - path: /api/rooms
        pathType: Prefix
        backend:
          service:
            name: booking-service
            port:
              number: 8081

      # 3. Đường dẫn gốc trỏ về giao diện Frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80